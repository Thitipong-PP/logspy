name: Go Test

# When should this workflow run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest # Run on a fresh Linux machine

    steps:
    # 1. Check out the code from the repository
    - name: Check out code
      uses: actions/checkout@v4

    # 2. Install Go on the machine
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.6' # Change this to your Go version if needed

    # 3. Run the tests!
    - name: Run tests with verbose output
      run: go test -v ./...